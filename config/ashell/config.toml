log_level = "warn"
position = "Top"
layer = "Top"

[modules]
left = [ [ "Workspaces", "MediaPlayer" ] ]
center = [ "WindowTitle" ]
right = [ [ "SystemInfo", "Tempo" ] , [ "Privacy", "Settings" ] , "Tray" ]

[workspaces]
visibility_mode = "All"
group_by_monitor = false
enable_workspace_filling = false

[media_player]
max_title_length = 50
indicator_format = "IconAndTitle"

[window_title]
mode = "Title"
truncate_title_after_length = 50

[system_info]
indicators = [ "Temperature", { Disk = "/home", Name = "home" }, { Disk = "/mnt/data", Name = "data" } ]
interval = 5

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.temperature]
warn_threshold = 60
alert_threshold = 80
sensor = "coretemp Package id 0"

[tempo]
clock_format = "%d/%m/%Y %R"

[settings]
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
battery_format = "IconAndPercentage"
peripheral_battery_format = "Icon"
audio_indicator_format = "IconAndPercentage"
microphone_indicator_format = "IconAndPercentage"
network_indicator_format = "Icon"
brightness_indicator_format = "IconAndPercentage"
indicators = [ "Brightness", "Audio", "Microphone", "Network", "Battery" ]

[appearance]
style = "Solid"
layer = "Top"
position = "Top"

font_name = "Fira Code"

primary_color = "#7aa2f7"
success_color = "#40a02b"
text_color = "#4c4f69"
workspace_colors = [ "#d20f39", "#e64553" ]
special_workspace_colors = [ "#8839ef", "#ea76cb" ]

[appearance.danger_color]
base = "#d20f39"
weak = "#fe640b"

[appearance.background_color]
base = "#eff1f5"
weak = "#e6e9ef"
strong = "#ccd0da"

[appearance.secondary_color]
base = "#bcc0cc"
